name: Build Releases

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Which platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - windows
          - macos

jobs:
  build-linux:
    if: inputs.platform == 'all' || inputs.platform == 'linux'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev librsvg2-bin libxcb-cursor0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller packaging/PianoMIDIViewer.spec

      - name: Generate icon
        run: rsvg-convert -w 256 -h 256 assets/icon.svg -o piano-midi-viewer.png

      - name: Create AppDir
        run: |
          mkdir -p PianoMIDIViewer.AppDir/usr/bin
          cp -a dist/PianoMIDIViewer/* PianoMIDIViewer.AppDir/usr/bin/
          cp piano-midi-viewer.png PianoMIDIViewer.AppDir/piano-midi-viewer.png

          cat > PianoMIDIViewer.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/PianoMIDIViewer" "$@"
          APPRUN
          chmod +x PianoMIDIViewer.AppDir/AppRun

          cat > PianoMIDIViewer.AppDir/piano-midi-viewer.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Piano MIDI Viewer
          Exec=PianoMIDIViewer
          Icon=piano-midi-viewer
          Type=Application
          Categories=AudioVideo;Audio;Music;Education;
          DESKTOP

      - name: Build AppImage
        run: |
          curl -sL https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool PianoMIDIViewer.AppDir PianoMIDIViewer-x86_64.AppImage
          echo "=== AppImage size ==="
          ls -lh PianoMIDIViewer-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PianoMIDIViewer-linux-x86_64
          path: PianoMIDIViewer-x86_64.AppImage

  build-windows:
    if: inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icon
        run: magick assets/icon.svg -define icon:auto-resize=256,128,64,48,32,16 icon.ico

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name PianoMIDIViewer --icon=icon.ico --add-data "assets/JetBrainsMono-Regular.ttf;assets" --exclude-module PyQt6.QtPdf --exclude-module PyQt6.QtPdfWidgets --exclude-module PyQt6.QtWebEngine --exclude-module PyQt6.QtWebEngineCore --exclude-module PyQt6.QtWebEngineWidgets --exclude-module PyQt6.QtQuick --exclude-module PyQt6.QtQml --exclude-module PyQt6.QtDesigner --exclude-module PyQt6.QtMultimedia --exclude-module tkinter --exclude-module unittest piano_viewer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PianoMIDIViewer-windows-x86_64
          path: dist/PianoMIDIViewer.exe

  # Build separate ARM and Intel macOS app bundles using the spec file,
  # then combine every Mach-O file with lipo into a universal2 bundle.
  #
  # Key: artifacts are uploaded as tarballs to preserve symlinks and
  # file permissions.  PyInstaller 6.0+ uses symlinks to cross-link
  # Contents/Frameworks/ and Contents/Resources/ — without tar,
  # upload-artifact resolves symlinks into full copies (2x bloat).

  build-macos-arm:
    if: inputs.platform == 'all' || inputs.platform == 'macos'
    runs-on: macos-14  # M1 Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icon
        run: |
          brew install librsvg
          mkdir icon.iconset
          for size in 16 32 128 256 512; do
            retina=$((size * 2))
            rsvg-convert -w $size -h $size assets/icon.svg -o icon.iconset/icon_${size}x${size}.png
            rsvg-convert -w $retina -h $retina assets/icon.svg -o icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build macOS ARM app bundle
        run: pyinstaller packaging/PianoMIDIViewer-macos.spec

      - name: Clean up dangling symlinks from excluded frameworks
        run: |
          find dist/PianoMIDIViewer.app -type l ! -exec test -e {} \; -delete
          find dist/PianoMIDIViewer.app -type d -empty -delete

      - name: Archive app bundle (preserves symlinks and permissions)
        run: tar -czf arm64-app.tar.gz -C dist PianoMIDIViewer.app

      - name: Show build size
        run: du -sh dist/PianoMIDIViewer.app

      - name: Upload ARM app bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-app
          path: arm64-app.tar.gz

  build-macos-intel:
    if: inputs.platform == 'all' || inputs.platform == 'macos'
    runs-on: macos-15-intel  # Intel x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icon
        run: |
          brew install librsvg
          mkdir icon.iconset
          for size in 16 32 128 256 512; do
            retina=$((size * 2))
            rsvg-convert -w $size -h $size assets/icon.svg -o icon.iconset/icon_${size}x${size}.png
            rsvg-convert -w $retina -h $retina assets/icon.svg -o icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build macOS Intel app bundle
        run: pyinstaller packaging/PianoMIDIViewer-macos.spec

      - name: Clean up dangling symlinks from excluded frameworks
        run: |
          find dist/PianoMIDIViewer.app -type l ! -exec test -e {} \; -delete
          find dist/PianoMIDIViewer.app -type d -empty -delete

      - name: Archive app bundle (preserves symlinks and permissions)
        run: tar -czf x86_64-app.tar.gz -C dist PianoMIDIViewer.app

      - name: Show build size
        run: du -sh dist/PianoMIDIViewer.app

      - name: Upload Intel app bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-app
          path: x86_64-app.tar.gz

  combine-macos:
    if: inputs.platform == 'all' || inputs.platform == 'macos'
    needs: [build-macos-arm, build-macos-intel]
    runs-on: macos-14
    steps:
      - name: Download ARM artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-app
          path: downloads

      - name: Download Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64-app
          path: downloads

      - name: Extract app bundles
        run: |
          mkdir arm64-app x86_64-app
          tar -xzf downloads/arm64-app.tar.gz -C arm64-app
          tar -xzf downloads/x86_64-app.tar.gz -C x86_64-app
          echo "=== ARM bundle ==="
          du -sh arm64-app/PianoMIDIViewer.app
          echo "=== Intel bundle ==="
          du -sh x86_64-app/PianoMIDIViewer.app

      - name: Combine into universal2 with lipo
        run: |
          # Use ARM app bundle as base (preserves Info.plist, resources, icon,
          # symlink structure, and file permissions)
          cp -a arm64-app/PianoMIDIViewer.app universal-app

          # Lipo every real Mach-O file from both bundles.
          # -type f skips symlinks — each binary is lipo'd once at its real
          # location, and cross-linking symlinks continue to point there.
          combined=0
          find arm64-app/PianoMIDIViewer.app -type f | while read arm_file; do
            rel="${arm_file#arm64-app/PianoMIDIViewer.app/}"
            intel_file="x86_64-app/PianoMIDIViewer.app/$rel"
            universal_file="universal-app/$rel"

            # Skip files that don't exist in both bundles
            [ -f "$intel_file" ] || continue

            # Only lipo Mach-O files (executables and libraries)
            if file "$arm_file" | grep -q "Mach-O"; then
              lipo -create "$arm_file" "$intel_file" -output "$universal_file"
              echo "  [UNIVERSAL] $rel"
              combined=$((combined + 1))
            fi
          done

          # Safety: ensure main executable is executable
          chmod +x universal-app/Contents/MacOS/PianoMIDIViewer

          # Verify
          echo ""
          echo "=== Main executable ==="
          file universal-app/Contents/MacOS/PianoMIDIViewer
          lipo -info universal-app/Contents/MacOS/PianoMIDIViewer
          echo ""
          echo "=== Bundle size ==="
          du -sh universal-app

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -a universal-app dmg_staging/PianoMIDIViewer.app
          ln -s /Applications dmg_staging/Applications
          printf '%s\n' \
            "How to install Piano MIDI Viewer" \
            "================================" \
            "" \
            "1. Drag PianoMIDIViewer.app to the Applications folder." \
            "" \
            "2. Open Terminal (press Cmd+Space, type \"Terminal\", press Enter)." \
            "" \
            "3. Paste this command and press Enter:" \
            "" \
            "   xattr -cr /Applications/PianoMIDIViewer.app" \
            "" \
            "4. Open PianoMIDIViewer from your Applications folder." \
            "" \
            "Step 3 is needed because the app is not signed with an Apple" \
            "Developer certificate. The xattr command removes the macOS" \
            "quarantine flag so the app can run normally." \
            > dmg_staging/README.txt
          hdiutil create -volname "Piano MIDI Viewer" -srcfolder dmg_staging -ov -format UDZO PianoMIDIViewer.dmg
          echo "=== DMG size ==="
          ls -lh PianoMIDIViewer.dmg

      - name: Upload universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: PianoMIDIViewer-macos-universal
          path: PianoMIDIViewer.dmg

  create-release:
    needs: [build-linux, build-windows, combine-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            PianoMIDIViewer-linux-x86_64/PianoMIDIViewer-x86_64.AppImage
            PianoMIDIViewer-windows-x86_64/PianoMIDIViewer.exe
            PianoMIDIViewer-macos-universal/PianoMIDIViewer.dmg
