name: Build Releases

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v8.2.0
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller PianoMIDIViewer.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PianoMIDIViewer-linux-x86_64
          path: dist/PianoMIDIViewer

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name PianoMIDIViewer --add-data "JetBrainsMono-Regular.ttf;." --exclude-module PyQt6.QtPdf --exclude-module PyQt6.QtPdfWidgets --exclude-module PyQt6.QtWebEngine --exclude-module PyQt6.QtWebEngineCore --exclude-module PyQt6.QtWebEngineWidgets --exclude-module PyQt6.QtQuick --exclude-module PyQt6.QtQml --exclude-module PyQt6.QtDesigner --exclude-module PyQt6.QtMultimedia --exclude-module tkinter --exclude-module unittest piano_viewer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PianoMIDIViewer-windows-x86_64
          path: dist/PianoMIDIViewer.exe

  build-macos:
    runs-on: macos-14  # M1 Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS ARM app bundle
        run: |
          pyinstaller --onefile --windowed --name PianoMIDIViewer \
            --add-data "JetBrainsMono-Regular.ttf:." \
            --osx-bundle-identifier com.skoomabwoy.pianomidiviewer \
            --exclude-module PyQt6.QtPdf \
            --exclude-module PyQt6.QtPdfWidgets \
            --exclude-module PyQt6.QtWebEngine \
            --exclude-module PyQt6.QtWebEngineCore \
            --exclude-module PyQt6.QtWebEngineWidgets \
            --exclude-module PyQt6.QtQuick \
            --exclude-module PyQt6.QtQml \
            --exclude-module PyQt6.QtDesigner \
            --exclude-module PyQt6.QtMultimedia \
            --exclude-module tkinter \
            --exclude-module unittest \
            piano_viewer.py

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -R dist/PianoMIDIViewer.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Piano MIDI Viewer" -srcfolder dmg_staging -ov -format UDZO dist/PianoMIDIViewer.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: PianoMIDIViewer-macos-arm64
          path: dist/PianoMIDIViewer.dmg

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            PianoMIDIViewer-linux-x86_64/PianoMIDIViewer
            PianoMIDIViewer-windows-x86_64/PianoMIDIViewer.exe
            PianoMIDIViewer-macos-arm64/PianoMIDIViewer.dmg
