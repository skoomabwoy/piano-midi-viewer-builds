name: Build Releases

on:
  workflow_dispatch:  # Manual trigger only — saves free minutes

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller PianoMIDIViewer.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PianoMIDIViewer-linux-x86_64
          path: dist/PianoMIDIViewer

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icon
        run: magick icon.svg -define icon:auto-resize=256,128,64,48,32,16 icon.ico

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name PianoMIDIViewer --icon=icon.ico --add-data "JetBrainsMono-Regular.ttf;." --exclude-module PyQt6.QtPdf --exclude-module PyQt6.QtPdfWidgets --exclude-module PyQt6.QtWebEngine --exclude-module PyQt6.QtWebEngineCore --exclude-module PyQt6.QtWebEngineWidgets --exclude-module PyQt6.QtQuick --exclude-module PyQt6.QtQml --exclude-module PyQt6.QtDesigner --exclude-module PyQt6.QtMultimedia --exclude-module tkinter --exclude-module unittest piano_viewer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PianoMIDIViewer-windows-x86_64
          path: dist/PianoMIDIViewer.exe

  # Build separate ARM and Intel macOS app bundles (--onedir mode),
  # then combine every Mach-O file with lipo into a universal2 bundle.
  # --onedir is required because --onefile appends an archive after the
  # Mach-O data, which lipo corrupts when combining architectures.

  build-macos-arm:
    runs-on: macos-14  # M1 Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icon
        run: |
          brew install librsvg
          mkdir icon.iconset
          for size in 16 32 128 256 512; do
            retina=$((size * 2))
            rsvg-convert -w $size -h $size icon.svg -o icon.iconset/icon_${size}x${size}.png
            rsvg-convert -w $retina -h $retina icon.svg -o icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build macOS ARM app bundle
        run: |
          pyinstaller --windowed --name PianoMIDIViewer \
            --icon=icon.icns \
            --add-data "JetBrainsMono-Regular.ttf:." \
            --osx-bundle-identifier com.skoomabwoy.pianomidiviewer \
            --exclude-module PyQt6.QtPdf \
            --exclude-module PyQt6.QtPdfWidgets \
            --exclude-module PyQt6.QtWebEngine \
            --exclude-module PyQt6.QtWebEngineCore \
            --exclude-module PyQt6.QtWebEngineWidgets \
            --exclude-module PyQt6.QtQuick \
            --exclude-module PyQt6.QtQml \
            --exclude-module PyQt6.QtDesigner \
            --exclude-module PyQt6.QtMultimedia \
            --exclude-module tkinter \
            --exclude-module unittest \
            piano_viewer.py

      - name: Upload ARM app bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-app
          path: dist/PianoMIDIViewer.app

  build-macos-intel:
    runs-on: macos-15-intel  # Intel x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icon
        run: |
          brew install librsvg
          mkdir icon.iconset
          for size in 16 32 128 256 512; do
            retina=$((size * 2))
            rsvg-convert -w $size -h $size icon.svg -o icon.iconset/icon_${size}x${size}.png
            rsvg-convert -w $retina -h $retina icon.svg -o icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build macOS Intel app bundle
        run: |
          pyinstaller --windowed --name PianoMIDIViewer \
            --icon=icon.icns \
            --add-data "JetBrainsMono-Regular.ttf:." \
            --osx-bundle-identifier com.skoomabwoy.pianomidiviewer \
            --exclude-module PyQt6.QtPdf \
            --exclude-module PyQt6.QtPdfWidgets \
            --exclude-module PyQt6.QtWebEngine \
            --exclude-module PyQt6.QtWebEngineCore \
            --exclude-module PyQt6.QtWebEngineWidgets \
            --exclude-module PyQt6.QtQuick \
            --exclude-module PyQt6.QtQml \
            --exclude-module PyQt6.QtDesigner \
            --exclude-module PyQt6.QtMultimedia \
            --exclude-module tkinter \
            --exclude-module unittest \
            piano_viewer.py

      - name: Upload Intel app bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-app
          path: dist/PianoMIDIViewer.app

  combine-macos:
    needs: [build-macos-arm, build-macos-intel]
    runs-on: macos-14
    steps:
      - name: Download ARM app bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-app
          path: arm64-app

      - name: Download Intel app bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64-app
          path: x86_64-app

      - name: Combine into universal2 with lipo
        run: |
          # Use ARM app bundle as base (preserves Info.plist, resources, icon, etc.)
          cp -R arm64-app universal-app

          # Lipo every Mach-O file (executables, .dylib, .so) from both bundles
          combined=0
          find arm64-app -type f | while read arm_file; do
            rel="${arm_file#arm64-app/}"
            intel_file="x86_64-app/$rel"
            universal_file="universal-app/$rel"

            # Skip files that don't exist in both bundles
            [ -f "$intel_file" ] || continue

            # Only lipo Mach-O files (executables and libraries)
            if file "$arm_file" | grep -q "Mach-O"; then
              lipo -create "$arm_file" "$intel_file" -output "$universal_file"
              echo "  [UNIVERSAL] $rel"
              combined=$((combined + 1))
            fi
          done

          # Verify the main executable
          echo ""
          echo "=== Main executable ==="
          file universal-app/Contents/MacOS/PianoMIDIViewer
          lipo -info universal-app/Contents/MacOS/PianoMIDIViewer

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -R universal-app dmg_staging/PianoMIDIViewer.app
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Piano MIDI Viewer" -srcfolder dmg_staging -ov -format UDZO PianoMIDIViewer.dmg

      - name: Upload universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: PianoMIDIViewer-macos-universal
          path: PianoMIDIViewer.dmg

  create-release:
    needs: [build-linux, build-windows, combine-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            PianoMIDIViewer-linux-x86_64/PianoMIDIViewer
            PianoMIDIViewer-windows-x86_64/PianoMIDIViewer.exe
            PianoMIDIViewer-macos-universal/PianoMIDIViewer.dmg
